services:
  bpo-ai:
    build: .
    container_name: bpo-ai-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Monta la carpeta de empresas para agregar YAMLs sin rebuild
      - ./app/config/companies:/app/app/config/companies:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/solicitudes/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s